name: bloc_clean_arch
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  get_it: ^9.2.1
  injectable: ^2.5.1
  firebase_analytics: ^12.3.0
  unique_device_identifier: ^2.0.4
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1
  phone_number_hint: ^0.0.6
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5
  talker: ^5.1.16
  connectivity_plus: ^7.1.1
  awesome_notifications: ^0.11.0
  permission_handler: ^12.0.1
  safe_device: ^1.3.8
  screen_protector: ^1.5.1
  url_launcher: ^6.3.2
  dio: ^5.9.2
  talker_dio_logger: ^5.1.16
  dartz: ^0.10.1
  http_certificate_pinning: ^3.0.1
  crypto: ^3.0.7
  flutter_bloc: ^9.1.1
  go_router: ^17.2.2
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.8
  injectable_generator: ^2.7.0
  json_serializable: ^6.11.2
  freezed: ^3.2.3

  # Linting
  flutter_lints: ^6.0.0

  # Assets & localization generation
  flutter_gen_runner: ^5.12.0
  flutter_gen: ^5.12.0

  # ✅ ADD THIS (IMPORTANT)
  dart_define: ^2.1.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/

  fonts:
    - family: Flink
      fonts:
        - asset: assets/fonts/flink/FlinkRegular.otf
          weight: 400
        - asset: assets/fonts/flink/FlinkMedium.otf
          weight: 500
        - asset: assets/fonts/flink/FlinkBold.otf
          weight: 700

